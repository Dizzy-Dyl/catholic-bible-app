<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Catholic Bible Companion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bible Companion" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background: #ffffff;
      color: #111111;
    }

    #app { min-height: 100vh; display: flex; flex-direction: column; }

    header, footer {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #e0e0e0;
      background: #ffffff;
    }

    footer {
      border-top: 1px solid #e0e0e0;
      margin-top: auto;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #888888;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    main {
      flex: 1;
      padding: 1.75rem 1.25rem;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .tabs { display: flex; border: 1px solid #111111; border-radius: 12px; overflow: hidden; }

    .tab-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border: none;
      background: none;
      font: inherit;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: background 0.15s ease;
    }

    .tab-btn.active { background: #111111; color: #ffffff; }

    .tab-btn:not(.active):hover { background: #f5f5f5; }

    .tab-panel { display: none; border: 1px solid #111111; border-radius: 16px; padding: 1.5rem; }

    .tab-panel.active { display: block; }

    .panel-title { margin: 0 0 1rem; font-size: 1rem; font-weight: 600; letter-spacing: 0.03em; }

    textarea, select {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #cccccc;
      padding: 0.9rem;
      font: inherit;
      background: #ffffff;
      color: #111111;
    }

    textarea:focus-visible, select:focus-visible { outline: none; border-color: #111111; }

    .controls { margin-top: 0.8rem; display: flex; justify-content: space-between; align-items: center; gap: 0.75rem; }

    button {
      border-radius: 999px;
      border: 1px solid #111111;
      background: #111111;
      color: #ffffff;
      font-size: 0.8rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.6rem 1.3rem;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: #ffffff;
      color: #111111;
      box-shadow: 0 8px 20px rgba(0,0,0,0.12);
      transform: translateY(-1px);
    }

    button:disabled { opacity: 0.5; cursor: default; }

    .status { font-size: 0.75rem; color: #555; }

    .output {
      border-top: 1px solid #e0e0e0;
      margin-top: 1.2rem;
      padding-top: 1rem;
      font-size: 0.92rem;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    @media (min-width: 768px) {
      main {
        padding-top: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <h1>Bible Companion</h1>
    </header>

    <main>
      <p class="tagline">Ask quietly about Scripture and faith.</p>

      <section class="panel">
        <h2 class="panel-title">Ask AI</h2>

        <textarea
          id="question"
          placeholder="Ask a simple question (for example: “What does the Lord’s Prayer teach about trust?”)">
        </textarea>

        <div class="controls">
          <button id="ask-button">Ask</button>
          <span id="status" class="status"></span>
        </div>

        <div id="answer" class="output"></div>
      </section>
    </main>

    <footer>
      Catholic Bible Companion
    </footer>
  </div>

  <script>
    const askButton = document.getElementById('ask-button');
    const questionEl = document.getElementById('question');
    const statusEl = document.getElementById('status');
    const answerEl = document.getElementById('answer');

    async function askAI() {
      const question = questionEl.value.trim();
      if (!question) return;

      askButton.disabled = true;
      statusEl.textContent = 'Thinking…';
      answerEl.textContent = '';

      try {
        const response = await fetch('https://catholic-bible-app-production.up.railway.app/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        if (!response.ok) {
          throw new Error('Network response was not ok');
        }

        const data = await response.json();
        answerEl.textContent = data.answer || 'No answer returned.';
        statusEl.textContent = '';
      } catch (err) {
        statusEl.textContent = 'Error talking to AI.';
        answerEl.textContent = '';
        console.error(err);
      } finally {
        askButton.disabled = false;
      }
    }

    askButton.addEventListener('click', askAI);
    questionEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        askAI();
      }
    });
  </script>
</body>
</html>
